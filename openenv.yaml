name: incident-commander-openenv
description: Real-world incident response simulation environment for DevOps scenarios
entrypoint: main.py

environment:
  framework: openenv
  type: reinforcement-learning

tasks:
  - id: tls-certificate-expiry
    name: TLS Certificate Expiry
    difficulty: easy

  - id: db-pool-exhaustion
    name: Database Pool Exhaustion
    difficulty: medium

  - id: idp-outage-vs-security
    name: IDP Outage vs Security Incident
    difficulty: hard
